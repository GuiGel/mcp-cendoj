repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch  # prevent direct commits to main
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-lint
        name: Ruff Lint
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: pyright
        name: Pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: coverage-gate
        name: Coverage Gate
        entry: uv run pytest --cov=mcp_cendoj --cov-report=term-missing -q
        language: system
        pass_filenames: false
        stages: [pre-push]
